definitions:
  errorcode.Error:
    type: object
  requests.AuthLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.BasicAuthFields:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.CommonIdRequest:
    properties:
      id:
        type: integer
    type: object
  requests.DockerFields:
    properties:
      auth:
        type: string
      email:
        type: string
      password:
        type: string
      server:
        type: string
      username:
        type: string
    type: object
  requests.EnvironmentVariable:
    properties:
      name:
        description: 环境变量名
        type: string
      value:
        description: 环境变量值
        type: string
    type: object
  requests.HealthCheckDetail:
    properties:
      command:
        description: Type=Command 时使用
        type: string
      failure_threshold:
        type: integer
      http_header:
        items:
          $ref: '#/definitions/requests.HttpHeader'
        type: array
      initial_delay_seconds:
        type: integer
      path:
        type: string
      period_seconds:
        type: integer
      port:
        type: integer
      protocol:
        type: string
      success_threshold:
        type: integer
      timeout_seconds:
        type: integer
      types:
        description: HTTP|TCP|Command
        type: string
    type: object
  requests.HttpHeader:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  requests.IngressPathRule:
    properties:
      path:
        description: 访问路径（如 /、/api、/api/(.*)）
        type: string
      path_type:
        description: 'pathType: Exact / Prefix / ImplementationSpecific'
        type: string
      service_name:
        description: 后端 Service 名称
        type: string
      service_port:
        description: 后端 Service 端口（支持命名端口，故用字符串；可传 "80" 或 "http"）
        type: string
    type: object
  requests.IngressRule:
    properties:
      host:
        type: string
      paths:
        items:
          $ref: '#/definitions/requests.IngressPathRule'
        type: array
    type: object
  requests.IngressTLS:
    properties:
      hosts:
        items:
          type: string
        type: array
      secret_name:
        type: string
    type: object
  requests.K8sClusterCreateRequest:
    properties:
      cluster_name:
        type: string
      cluster_version:
        type: string
      kube_config:
        type: string
    type: object
  requests.K8sClusterDeleteRequest:
    properties:
      cluster_name:
        type: string
      force:
        description: 可选：是否强制删除
        type: boolean
      id:
        type: integer
    type: object
  requests.K8sClusterInitRequest:
    properties:
      id:
        type: integer
    type: object
  requests.K8sClusterUpdateRequest:
    properties:
      cluster_name:
        type: string
      cluster_version:
        type: string
      id:
        type: integer
      kube_config:
        type: string
      status:
        type: integer
    type: object
  requests.KubeConfigMapCreateRequest:
    properties:
      annotations:
        type: string
      binaryData:
        additionalProperties:
          items:
            format: int32
            type: integer
          type: array
        type: object
      cluster_id:
        type: integer
      data:
        description: ConfigMap 的数据部分：文本型与二进制型
        type: string
      labels:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeCronJobCreateRequest:
    type: object
  requests.KubeCronJobDeleteRequest:
    properties:
      cascade:
        description: 是否级联清理：通常删除 CronJob 时是否一并清理其历史 Job
        type: boolean
      cluster_id:
        type: integer
      force:
        type: boolean
      grace_period_seconds:
        type: integer
      name:
        type: string
      namespace:
        type: string
      timeout_seconds:
        type: integer
      wait:
        type: boolean
    type: object
  requests.KubeCronJobSuspendRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=暂停，false=恢复
        type: boolean
    type: object
  requests.KubeDaemonSetCreateRequest:
    type: object
  requests.KubeDaemonSetRollbackRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      revision_name:
        description: |-
          指定回滚到的历史版本（ControllerRevision）
          建议用 revision_name（更直观），如果你喜欢数字 revision 也可以再加一个 int64 字段做二选一
        type: string
    type: object
  requests.KubeDaemonSetUpdateImageRequest:
    properties:
      cluster_id:
        type: integer
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentCreateRequest:
    properties:
      container_command:
        description: 容器启动命令（可选）
        type: string
      container_command_args:
        description: 容器启动参数（可选）
        type: string
      container_image:
        description: 容器镜像
        type: string
      cpu_requirement:
        description: CPU 需求（可选）
        type: string
      description:
        description: 描述信息（可选）
        type: string
      image_pull_secret:
        description: 镜像拉取密钥（可选）
        type: string
      is_create_service:
        description: 是否同时创建 Service
        type: boolean
      is_liveness_enable:
        description: 是否启用 Liveness 探针
        type: boolean
      is_readiness_enable:
        description: 是否启用 Readiness 探针
        type: boolean
      labels:
        description: 标签
        items:
          $ref: '#/definitions/requests.Label'
        type: array
      liveness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Liveness 探针配置
      memory_requirement:
        description: 内存需求（可选）
        type: string
      name:
        description: Deployment 名称
        type: string
      namespace:
        description: 命名空间
        type: string
      port_mappings:
        description: 容器端口映射
        items:
          $ref: '#/definitions/requests.PortMapping'
        type: array
      readiness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Readiness 探针配置
      replicas:
        description: 副本数
        type: integer
      run_as_privileged:
        description: 是否以特权模式运行
        type: boolean
      service_name:
        description: Service 名称
        type: string
      service_type:
        description: Service 类型
        type: string
      variables:
        description: 环境变量
        items:
          $ref: '#/definitions/requests.EnvironmentVariable'
        type: array
    type: object
  requests.KubeDeploymentRestartRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentRollbackRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      replica_set:
        description: 指定回滚的 ReplicaSet
        type: string
    type: object
  requests.KubeDeploymentScaleRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      scale_num:
        description: 副本数量
        type: integer
    type: object
  requests.KubeDeploymentUpdateImageRequest:
    properties:
      cluster_id:
        type: integer
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentUpdateRequest:
    type: object
  requests.KubeIngressCreateRequest:
    properties:
      annotations:
        description: 可选注解（如 rewrite、限流等）
        type: string
      ingress_class_name:
        description: 例如："nginx"、"traefik"；可为空（走默认 class）
        type: string
      labels:
        description: 可选标签
        type: string
      name:
        type: string
      namespace:
        type: string
      rules:
        description: 规则：支持多个 host
        items:
          $ref: '#/definitions/requests.IngressRule'
        type: array
      tls:
        description: 可选 TLS 列表
        items:
          $ref: '#/definitions/requests.IngressTLS'
        type: array
    type: object
  requests.KubeJobCreateRequest:
    type: object
  requests.KubeJobRestartRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeJobSuspendRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=挂起，false=恢复
        type: boolean
    type: object
  requests.KubeNamespaceCreateRequest:
    properties:
      annotations:
        type: object
      description:
        description: 描述信息（可选） -> 写入 annotation
        type: string
      labels:
        description: Labels（可选）
        type: object
      name:
        description: Namespace 名称（必填）
        type: string
      quota_cpu:
        type: string
      quota_memory:
        type: string
      quota_pods:
        type: string
    type: object
  requests.KubeNamespaceUpdateRequest:
    type: object
  requests.KubeNodeCordonRequest:
    properties:
      nodeName:
        type: string
      unschedulable:
        type: boolean
    type: object
  requests.KubeNodeUncordonRequest:
    properties:
      name:
        type: string
      nodeName:
        type: string
    type: object
  requests.KubePVCCreateRequest:
    type: object
  requests.KubePVCResizeRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      storage:
        description: e.g. "20Gi"
        type: string
    type: object
  requests.KubePVCreateRequest:
    type: object
  requests.KubePodEvictRequest:
    properties:
      namespace:
        type: string
      podName:
        type: string
    type: object
  requests.KubePodUpdateRequest:
    properties:
      cluster_id:
        type: integer
      content:
        description: 原始 Pod JSON
        type: object
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeSecretCreateRequest:
    properties:
      annotations:
        type: string
      basic:
        $ref: '#/definitions/requests.BasicAuthFields'
      data:
        description: 通用键值（Opaque 或直接键值对）
        type: string
      docker:
        $ref: '#/definitions/requests.DockerFields'
      labels:
        type: string
      mode:
        description: 推荐传 mode（更语义化），兼容 types（原生 k8s 类型字符串）
        type: string
      name:
        type: string
      namespace:
        type: string
      ssh:
        $ref: '#/definitions/requests.SSHAuthFields'
      string_data:
        type: string
      tls:
        allOf:
        - $ref: '#/definitions/requests.TLSFields'
        description: 专用结构体
      types:
        type: string
    type: object
  requests.KubeSecretDecodeRequest:
    properties:
      data:
        additionalProperties:
          type: string
        description: '批量解码，例如 {"username": "YWRtaW4=", "password": "MTIzNDU2"}'
        type: object
      value:
        description: 单个字符串解码，例如 "YWRtaW4="
        type: string
    type: object
  requests.KubeServiceCreateRequest:
    properties:
      annotations:
        type: string
      cluster_ip:
        description: 可选项
        type: string
      external_traffic_policy:
        description: Local / Cluster（LB/NodePort 常用）
        type: string
      name:
        type: string
      namespace:
        description: 命名空间 & 名称
        type: string
      ports:
        description: 端口规则
        items:
          $ref: '#/definitions/requests.ServicePortRule'
        type: array
      selector:
        type: string
      selector_labels:
        description: 选择器：建议用 label 列表；也支持传 map（Swagger 里以字符串展示）
        items:
          $ref: '#/definitions/requests.Label'
        type: array
      session_affinity:
        description: None / ClientIP
        type: string
      types:
        description: |-
          Service 类型：ClusterIP / NodePort / LoadBalancer / Headless
          Headless 时 cluster_ip 建议传 "None"
        type: string
    type: object
  requests.KubeStatefulSetCreateRequest:
    properties:
      container_command:
        description: 容器启动命令
        type: string
      container_command_args:
        description: 容器启动参数
        type: string
      container_image:
        description: 主容器镜像
        type: string
      cpu_requirement:
        description: CPU 需求（可选）
        type: string
      description:
        description: 描述信息（可选）
        type: string
      image_pull_secret:
        description: 镜像/启动相关（可选）
        type: string
      is_create_service:
        description: Service 相关（StatefulSet 必须绑定一个服务名，通常为 Headless Service）
        type: boolean
      is_liveness_enable:
        description: 是否启用 Liveness
        type: boolean
      is_readiness_enable:
        description: 是否启用 Readiness
        type: boolean
      labels:
        description: 标签
        items:
          $ref: '#/definitions/requests.Label'
        type: array
      liveness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Liveness 配置
      memory_requirement:
        description: 资源/标签/环境变量/端口
        type: string
      name:
        description: 基本信息
        type: string
      namespace:
        description: 命名空间
        type: string
      port_mappings:
        description: 端口映射
        items:
          $ref: '#/definitions/requests.PortMapping'
        type: array
      readiness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Readiness 配置
      replicas:
        description: 副本数
        type: integer
      run_as_privileged:
        description: 探针/特权
        type: boolean
      service_name:
        description: 必填：绑定的 Service 名（Headless 推荐）
        type: string
      service_type:
        description: Service 类型（ClusterIP/NodePort/...；Headless 时忽略）
        type: string
      variables:
        description: 环境变量
        items:
          $ref: '#/definitions/requests.EnvironmentVariable'
        type: array
      volume_claim_templates:
        description: 每个 Pod 的独立 PVC（StatefulSet 常用）
        items:
          $ref: '#/definitions/requests.VolumeClaimTemplate'
        type: array
    type: object
  requests.KubeStatefulSetRestartRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeStatefulSetScaleRequest:
    properties:
      cluster_id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      scale_num:
        description: 副本数量
        type: integer
    type: object
  requests.KubeStatefulSetUpdateImageRequest:
    properties:
      cluster_id:
        type: integer
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 mysql:8.0
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeStorageClassCreateRequest:
    properties:
      allowVolumeExpansion:
        type: boolean
      mountOptions:
        items:
          type: string
        type: array
      name:
        type: string
      parameters:
        type: string
      provisioner:
        type: string
      reclaimPolicy:
        description: Delete / Retain
        type: string
      volumeBindingMode:
        description: Immediate / WaitForFirstConsumer
        type: string
    type: object
  requests.Label:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  requests.PatchPodImageRequest:
    properties:
      container:
        type: string
      name:
        type: string
      namespace:
        type: string
      new_image:
        type: string
    type: object
  requests.PortMapping:
    properties:
      port:
        type: integer
      protocol:
        description: TCP/UDP/SCTP
        type: string
      target_port:
        type: integer
    type: object
  requests.SSHAuthFields:
    properties:
      known_hosts:
        type: string
      private_key:
        type: string
    type: object
  requests.ServicePortRule:
    properties:
      app_protocol:
        description: App 协议（可选）
        type: string
      name:
        description: 端口名，可选
        type: string
      node_port:
        description: NodePort（仅在 NodePort/LoadBalancer 类型下生效），可选
        type: integer
      port:
        description: Service 暴露端口（1~65535）
        type: integer
      protocol:
        description: 协议：TCP/UDP/SCTP
        type: string
      target_port:
        description: 指向 Pod 的容器端口；为兼容命名端口，这里用字符串（Swagger 友好）
        type: string
    type: object
  requests.TLSFields:
    properties:
      cert:
        description: -> tls.crt
        type: string
      key:
        description: -> tls.key
        type: string
    type: object
  requests.UserCreateRequest:
    properties:
      password:
        type: string
      password_confirm:
        type: string
      username:
        type: string
    type: object
  requests.UserUpdateRequest:
    properties:
      id:
        type: integer
      password:
        type: string
      username:
        type: string
    type: object
  requests.VolumeClaimTemplate:
    properties:
      access_mode:
        description: 例如 ReadWriteOnce
        type: string
      mount_path:
        description: 容器内挂载路径
        type: string
      name:
        description: PVC 名称（与 volumeMounts 对应）
        type: string
      storage_class:
        description: 存储类
        type: string
      storage_size:
        description: 例如 "5Gi"
        type: string
    type: object
  response.Response:
    type: object
info:
  contact: {}
paths:
  /api/:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: HelloWorld
      tags:
      - HelloWorld
  /api/v1/auth/login:
    post:
      description: 用户登录
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/errorcode.Error'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/errorcode.Error'
      summary: 用户登录
      tags:
      - 认证管理
  /api/v1/auth/logout:
    post:
      description: 清空会话并让会话 Cookie 立即过期（注意：不会自动使现有 JWT 失效）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 退出登录
      tags:
      - 认证管理
  /api/v1/k8s/cluster/create:
    post:
      description: 创建K8s集群
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.K8sClusterCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/errorcode.Error'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/errorcode.Error'
      security:
      - ApiKeyAuth: []
      summary: 创建K8s集群
      tags:
      - K8s集群管理
  /api/v1/k8s/cluster/delete:
    post:
      description: 删除K8s集群（软删除）
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.K8sClusterDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/errorcode.Error'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/errorcode.Error'
      security:
      - ApiKeyAuth: []
      summary: 删除K8s集群
      tags:
      - K8s集群管理
  /api/v1/k8s/cluster/init:
    post:
      description: 初始化K8s集群（连通性检测/预热）
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.K8sClusterInitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/errorcode.Error'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/errorcode.Error'
      security:
      - ApiKeyAuth: []
      summary: 初始化K8s集群
      tags:
      - K8s集群管理
  /api/v1/k8s/cluster/list:
    get:
      description: 列出K8s集群
      parameters:
      - description: K8s集群名
        in: query
        maxLength: 100
        name: cluster_name
        type: string
      - description: 页码
        in: query
        name: page
        required: true
        type: integer
      - description: 每页数量
        in: query
        name: limit
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            $ref: '#/definitions/errorcode.Error'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/errorcode.Error'
      security:
      - ApiKeyAuth: []
      summary: 列出K8s集群
      tags:
      - K8s集群管理
  /api/v1/k8s/cluster/update:
    post:
      description: 修改K8s集群
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.K8sClusterUpdateRequest'
      produces:
      - application/json
      responses:
