# This rule is not used by the project appconfig-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over operation.operation.top.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: appconfig-operator
    app.kubernetes.io/managed-by: kustomize
  name: appconfig-admin-role
rules:
- apiGroups:
  - operation.operation.top
  resources:
  - appconfigs
  verbs:
  - '*'
- apiGroups:
  - operation.operation.top
  resources:
  - appconfigs/status
  verbs:
  - get
