# This rule is not used by the project appconfig-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the operation.operation.top.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: appconfig-operator
    app.kubernetes.io/managed-by: kustomize
  name: appconfig-editor-role
rules:
- apiGroups:
  - operation.operation.top
  resources:
  - appconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operation.operation.top
  resources:
  - appconfigs/status
  verbs:
  - get
